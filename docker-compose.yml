services:
  app:
    build: .
    container_name: sentinel-app
    environment:
      # Reach the other services by their compose names, not localhost — inside
      # the container localhost is the app itself.
      QDRANT_URL: http://qdrant:6333
      PROMETHEUS_URL: http://prometheus:9090   # ingestion adapter: metric queries
      TARGET_URL: http://dummy:9000            # ingestion adapter: logs + deploys
      # Provide GROQ_API_KEY via a local .env file (see .env.example).
      GROQ_API_KEY: ${GROQ_API_KEY:?set GROQ_API_KEY in your .env}
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - prometheus
      - dummy

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sentinel-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_dev_pw
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- Demo stack: the target service Sentinel observes, and its Prometheus ---
  dummy:
    build:
      context: .
      dockerfile: dummy/Dockerfile
    container_name: sentinel-dummy
    ports:
      - "9000:9000"

  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - dummy

  cockpit:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: sentinel-cockpit
    environment:
      # Internal service-to-service URLs (compose DNS names).
      DUMMY_URL: http://dummy:9000
      SENTINEL_URL: http://app:8000
      PROMETHEUS_URL: http://prometheus:9090
      # Browser-facing links shown in the UI (published localhost ports).
      DUMMY_PUBLIC_URL: http://localhost:9000
      SENTINEL_PUBLIC_URL: http://localhost:8000
      PROMETHEUS_PUBLIC_URL: http://localhost:9090
    ports:
      - "8501:8501"
    depends_on:
      - app
      - dummy
      - prometheus

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
  prometheus_data:
