name: CI

# Lean CI:
#   * lint   — ruff, real-error rules only
#   * test   — the offline test suite (no keys, no services)
#   * docker — validate compose + build the light images (dummy, cockpit)
#
# No CD stage — the project is shown via recordings, not a live URL.

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Cancel an in-flight run when a new commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Ruff (pyflakes real-error rules)
        run: ruff check app eval ui dummy --select E9,F

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      # Light install: the base requirements have no torch (the tests never touch
      # the local embedding backend — they use SQLite, Celery eager mode, mocked
      # Jina, and deterministic eval fixtures), so CI stays fast.
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      # No GROQ_API_KEY and no services on purpose — every test here is offline.
      - name: Run offline test suite
        run: python -m pytest app/retrieval/test_embeddings.py app/db/test_repository.py app/test_tasks.py eval/test_harness.py eval/test_batch.py -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose config
        env:
          # Only satisfy the ${VAR:?} interpolations; not used at config time.
          GROQ_API_KEY: ci-placeholder
          JINA_API_KEY: ci-placeholder
        run: docker compose config -q
      - name: Build light images (dummy + cockpit)
        run: |
          docker build -f dummy/Dockerfile -t sentinel-dummy .
          docker build -f ui/Dockerfile -t sentinel-cockpit .
